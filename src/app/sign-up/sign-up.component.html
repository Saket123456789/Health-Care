<!-- signup.component.html -->

<div class="signup-wrapper">

  <div class="signup-card">

    <!-- LOGO -->
    <div class="logo-section">

      <div class="logo-icon">
        <i nz-icon nzType="heart" nzTheme="fill"></i>
      </div>

      <div>
        <h1 class="brand-title">MediFlow</h1>

        <p class="brand-subtitle">
          Your Health, Our Priority
        </p>
      </div>

    </div>

    <!-- HEADING -->
    <div class="heading-section">

      <h2>Create Your Account</h2>

      <p>
        Join MediFlow and manage your healthcare
      </p>

    </div>

    <!-- FORM -->
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

      <!-- REGISTER AS -->
      <div class="form-group">

        <label>Register As</label>

        <div class="register-type">

          <!-- PATIENT -->

          <div
            class="type-card active"
          >

            <div class="radio-circle active-circle"></div>

            <div>

              <h4>
                <i nz-icon nzType="user"></i>
                Patient
              </h4>

              <p>Book appointments</p>

            </div>

          </div>

          <!-- DOCTOR -->

          <div
            class="type-card"
          >

            <div class="radio-circle"></div>

            <div>

              <h4>
                <i nz-icon nzType="medicine-box"></i>
                Doctor
              </h4>

              <p>Manage your practice</p>

            </div>

          </div>

        </div>

      </div>

      <!-- NAME + EMAIL -->

      <div class="row">

        <!-- FULL NAME -->

        <div class="form-group flex-1">

          <label>Full Name</label>

          <div class="custom-input">

            <i nz-icon nzType="user"></i>

            <input
              type="text"
              placeholder="Enter your full name"
              formControlName="name"
            />

          </div>

        </div>

        <!-- EMAIL -->

        <div class="form-group flex-1">

          <label>Email Address</label>

          <div class="custom-input">

            <i nz-icon nzType="mail"></i>

            <input
              type="email"
              placeholder="Enter your email"
              formControlName="email"
            />

          </div>

        </div>

      </div>

      <!-- PHONE + PASSWORD -->

      <div class="row">

        <!-- PHONE -->

        <div class="form-group flex-1">

          <label>Phone Number</label>

          <div class="custom-input">

            <i nz-icon nzType="phone"></i>

            <input
              type="text"
              placeholder="Enter your phone number"
              formControlName="phone"
            />

          </div>

        </div>

        <!-- PASSWORD -->

        <div class="form-group flex-1">

          <label>Password</label>

          <div class="custom-input">

            <i nz-icon nzType="lock"></i>

            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Create a password"
              formControlName="password"
            />

            <i
              nz-icon
              class="eye-icon"
              [nzType]="showPassword ? 'eye-invisible' : 'eye'"
              (click)="showPassword = !showPassword"
            ></i>

          </div>

        </div>

      </div>

      <!-- CONFIRM PASSWORD -->

      <div class="form-group">

        <label>Confirm Password</label>

        <div class="custom-input">

          <i nz-icon nzType="lock"></i>

          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="Confirm your password"
            formControlName="confirmPassword"
          />

          <i
            nz-icon
            class="eye-icon"
            [nzType]="showConfirmPassword ? 'eye-invisible' : 'eye'"
            (click)="showConfirmPassword = !showConfirmPassword"
          ></i>

        </div>

      </div>

      <!-- TERMS -->

      <label class="checkbox-wrapper">

        <input type="checkbox" />

        <span>
          I agree to the
          <a href="#">Terms of Service</a>
          and
          <a href="#">Privacy Policy</a>
        </span>

      </label>

      <!-- SIGNUP BUTTON -->

      <button
        nz-button
        nzType="primary"
        class="signup-btn"
      >
        Sign Up
      </button>

      <!-- DIVIDER -->

      <div class="divider">

        <span>or continue with</span>

      </div>

      <!-- SOCIAL -->

      <div class="social-row">

        <button
          type="button"
          class="social-btn"
        >

          <img
            src="https://cdn-icons-png.flaticon.com/512/281/281764.png"
            alt="google"
          />

          Google

        </button>

        <button
          type="button"
          class="social-btn"
        >

          <img
            src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
            alt="microsoft"
          />

          Microsoft

        </button>

      </div>

      <!-- LOGIN -->

      <div class="login-text">

        Already have an account?

        <a (click)="backToLoginPage()">
          Login
        </a>

      </div>

    </form>

  </div>

</div>
